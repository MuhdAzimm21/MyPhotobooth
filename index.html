<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Modern Photobooth</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#18181b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Photobooth">
    <link rel="apple-touch-icon" href="assets/stickers/sticker1.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-900 text-white overflow-hidden min-h-screen h-screen w-screen flex flex-col">

    <div class="flex flex-col md:flex-row flex-1 overflow-hidden h-full w-full">
        
        <!-- Workspace (Camera & Canvas) - On mobile this is the main focus -->
        <main class="flex-1 relative flex flex-col lg:flex-row items-center justify-center p-2 md:p-8 gap-4 md:gap-8 overflow-y-auto md:overflow-visible">
            
            <!-- Camera View -->
            <div class="flex flex-col items-center gap-2 md:gap-4 w-full lg:w-1/2 max-w-xl">
                <div class="relative w-full aspect-video bg-black rounded-xl overflow-hidden shadow-2xl border-2 md:border-4 border-zinc-800">
                    <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
                    <div id="countdown" class="absolute inset-0 flex items-center justify-center text-6xl md:text-8xl font-black text-white pointer-events-none drop-shadow-lg"></div>
                </div>
                <div class="flex gap-2 w-full">
                    <button onclick="startCamera()" class="btn-main flex-1 bg-zinc-700 hover:bg-zinc-600 text-[10px] md:text-base py-2 md:py-3">Start Camera</button>
                    <button id="switchBtn" onclick="switchCamera()" class="btn-main flex-1 bg-zinc-700 hover:bg-zinc-600 text-[10px] md:text-base py-2 md:py-3 hidden">Switch</button>
                    <button onclick="startCapture()" class="btn-main flex-1 bg-red-600 hover:bg-red-500 text-[10px] md:text-base py-2 md:py-3">Take Photos</button>
                </div>
            </div>

            <!-- Canvas Preview -->
            <div class="w-full lg:w-1/2 flex items-center justify-center py-2 md:py-4 h-[40vh] lg:h-full">
                <div class="h-full aspect-[1/2] relative bg-white rounded shadow-2xl border-2 md:border-4 border-zinc-800 overflow-hidden">
                    <canvas id="canvas" class="h-full w-full object-contain"></canvas>
                </div>
            </div>

        </main>

        <!-- Sidebar / Drawer -->
        <aside class="w-full md:w-80 bg-zinc-800 border-t md:border-t-0 md:border-l border-zinc-700 flex flex-col h-auto md:h-full overflow-hidden p-4 gap-4 z-10 safe-area-bottom">
            <h1 class="text-xl font-bold tracking-tight text-center border-b border-zinc-700 pb-3 hidden md:block">PHOTOBOOTH</h1>
            
            <div class="flex flex-col gap-4 overflow-y-auto pr-1">
                <!-- Templates -->
                <section>
                    <h2 class="text-[10px] font-semibold text-zinc-400 uppercase mb-2">1. Templates</h2>
                    <div id="frames" class="flex md:grid md:grid-cols-2 gap-2 overflow-x-auto md:overflow-x-visible pb-2 md:pb-0 scrollbar-hide">
                        <!-- Content loaded by JS -->
                    </div>
                </section>

                <!-- Stickers -->
                <section>
                    <h2 class="text-[10px] font-semibold text-zinc-400 uppercase mb-2">2. Stickers</h2>
                    <div id="stickers" class="flex flex-row md:flex-wrap gap-2 overflow-x-auto md:overflow-x-visible pb-2 md:pb-0 scrollbar-hide">
                        <!-- Content loaded by JS -->
                    </div>
                </section>

                <!-- Text & Caption -->
                <section class="flex flex-col gap-2">
                    <h2 class="text-[10px] font-semibold text-zinc-400 uppercase mb-1">3. Caption</h2>
                    <div class="flex gap-2">
                        <input id="textInput" placeholder="Add caption..." class="flex-1 bg-zinc-900 border border-zinc-700 p-2 rounded text-xs focus:outline-none focus:border-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <select id="fontSelect" class="bg-zinc-900 border border-zinc-700 p-2 rounded text-xs">
                            <option>Arial</option>
                            <option>Courier</option>
                            <option>Comic Sans MS</option>
                            <option>Impact</option>
                        </select>
                        <input type="color" id="textColor" value="#000000" class="w-full h-8 bg-zinc-900 border border-zinc-700 rounded cursor-pointer">
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-zinc-500">Size:</span>
                        <input type="range" id="textSize" min="10" max="100" value="30" class="flex-1">
                    </div>
                    <button onclick="addText()" class="btn-primary w-full text-xs">Add Text</button>
                    <button onclick="clearCanvas()" class="text-[10px] text-zinc-500 hover:text-white mt-1 underline">Clear Canvas</button>
                </section>

                <!-- Actions -->
                <section class="mt-auto pt-4 border-t border-zinc-700 grid grid-cols-2 md:flex md:flex-col gap-2">
                    <button onclick="downloadPhoto()" class="btn-action">Save PNG</button>
                    <button onclick="createGIF()" class="btn-action">Save GIF</button>
                    <button onclick="shareWhatsApp()" class="btn-action bg-green-600 hover:bg-green-700 col-span-2">WhatsApp</button>
                </section>
            </div>
        </aside>

    </div>

    <!-- Scripts -->
    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log("Service Worker Registered"))
                .catch(err => console.error("SW Registration Failed", err));
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/app.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/sticker.js"></script>
    <script src="js/gif.js"></script>

</body>
</html>
